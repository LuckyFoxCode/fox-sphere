name: deploy

# Build ARM64 images, push to GHCR, then SSH to the Oracle VM and roll out.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  OWNER: luckyfoxcode

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: backend
            dockerfile: .docker/backend.Dockerfile
            target: runner
          - name: web
            dockerfile: .docker/web.Dockerfile
            target: ""
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3 # emulate arm64 on x86 runners
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: linux/arm64
          push: true
          # web overlay is same-origin (Option B) -> empty base URL.
          build-args: |
            VITE_API_BASE_URL=
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/foxsphere-${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/foxsphere-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ~/foxsphere
            docker compose -f docker-compose.prod.yml pull
            # Run migrations before swapping the app (one-shot container).
            docker compose -f docker-compose.prod.yml run --rm backend pnpm --filter backend migrate:deploy
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
