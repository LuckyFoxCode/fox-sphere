# Dev stack: backend (hot reload) + postgres. Frontend runs in the terminal.
services:
  postgres:
    image: postgres:18-alpine
    container_name: foxsphere-postgres
    environment:
      POSTGRES_USER: fox_user
      POSTGRES_PASSWORD: fox_password
      POSTGRES_DB: foxsphere_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fox_user -d foxsphere_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - foxsphere-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: foxsphere-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Twitch creds / PORT come from the gitignored .env...
    env_file:
      - apps/backend/.env
    # ...but DATABASE_URL must point at the compose service, so override it here.
    environment:
      DATABASE_URL: "postgresql://fox_user:fox_password@postgres:5432/foxsphere_db?schema=public"
      NODE_ENV: development
    # Build shared-schemas once, then run backend in watch mode (tsx).
    command: sh -c "pnpm --filter shared-schemas build && pnpm --filter backend dev"
    volumes:
      # Live source for hot reload...
      - ./apps/backend:/app/apps/backend
      - ./packages:/app/packages
      # ...but keep the image's per-package node_modules (don't let the host shadow them).
      - backend_node_modules:/app/apps/backend/node_modules
      - shared_schemas_node_modules:/app/packages/shared-schemas/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - foxsphere-network

volumes:
  postgres_data:
  backend_node_modules:
  shared_schemas_node_modules:

networks:
  foxsphere-network:
    driver: bridge
